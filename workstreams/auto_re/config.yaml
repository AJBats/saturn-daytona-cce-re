    file: build/save_states/cce_race_start.mc0
    inputs: []
    notes: "40 cars, rolling start 300 km/h, no input"
  race_throttle:
    file: build/save_states/cce_race_start.mc0
    inputs: [B]
    notes: "40 cars, rolling start, throttle held"
  straight_throttle:
    file: build/save_states/cce_tt_straight.mc0
    inputs: [B]
    frames: 650
    notes: "Dead stop, hold B, wall strike at frame 650"
  right_wall_strike:
    file: build/save_states/cce_tt_straight.mc0
    inputs: [RIGHT, B]
    frames: 150
    notes: "Angled right wall collision"
  offtrack_throttle:
    file: build/save_states/cce_tt_offtrack_stop.mc0
    inputs: [B]
    frames: 324
    notes: "Grass at frame 124, traction loss"
  pre_rolling_start:
    file: build/save_states/cce_pre_rolling_start.mc0
    inputs: []
    frames: 1363
    notes: "Loading screen through rolling start to GO, ~1363 frames"
  dino_canyon:
    file: build/save_states/cce_dino_canyon_countdown.mc0
    inputs: []
    frames: 200
    notes: "Dinosaur Canyon TT, countdown at 2, GO within ~200 frames"
  pre_attract:
    file: build/save_states/cce_pre_attract.mc0
    inputs: []
    frames: 1028
    notes: "Title screen, attract mode loads somewhere in 0-1028 frames"
  attract_race:
    file: build/save_states/cce_attract_race.mc0
    inputs: []
    frames: 5000
    notes: "AI-only demo race, no player input, 5000+ frames available"
  transplant_car_select:
    file: build/save_states/cce_transplant_car_select.mc0
    inputs: []
    notes: "Transplant mod disc (DUSA COL data). Car select screen, Three Seven. Cold booted."
    disc: "build/disc/rebuilt_disc/daytona_cce_rebuilt.cue"

struct_map_path: workstreams/driving_model/struct_map.md

cue_path: "external_resources/Daytona USA - Circuit Edition (Japan)/Daytona USA - Circuit Edition (Japan).cue"

mednafen:

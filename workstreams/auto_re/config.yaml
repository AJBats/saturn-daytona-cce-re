# auto_re project configuration — Daytona USA CCE

game_name: "Daytona USA CCE"

assembly_dir: src/race

car_struct:
  base: 0x0605224C
  stride: 0x100
  count: 40
  addressing: GBR

controls:
  throttle: B
  brake: A
  steer_left: LEFT
  steer_right: RIGHT

save_states:
